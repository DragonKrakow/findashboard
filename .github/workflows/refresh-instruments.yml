name: Refresh Instrument Universe

on:
  schedule:
    - cron: '0 5 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-instruments:
    name: Build instrument universe and commit JSON
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh instrument files
        run: python scripts/refresh_instruments.py

      - name: Commit refreshed instrument JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/instruments/latest/instruments.json data/instruments/latest/market_overview.json
          if git diff --cached --quiet; then
            echo "No instrument changes to commit."
          else
            git commit -m "chore: auto-refresh instrument universe [skip ci]"
            git push
          fi
